<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>دخول اللاعبين</title>
    <style>
        body { font-family: sans-serif; background: #f2f2f7; text-align: center; padding: 50px 20px; }
        .login-card { background: white; padding: 30px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); max-width: 400px; margin: auto; }
        .player-select-item { 
            display: flex; align-items: center; gap: 15px; padding: 10px; 
            border: 1px solid #eee; border-radius: 12px; margin-bottom: 10px; cursor: pointer; transition: 0.2s;
        }
        .player-select-item:hover { background: #007aff; color: white; }
        .player-select-item img { width: 40px; height: 40px; border-radius: 50%; object-fit: cover; }
    </style>
</head>
<body>

<div class="login-card">
    <h2>👋 أهلاً بك</h2>
    <p style="color: #666;">اختر اسمك من القائمة للدخول</p>
    <div id="playersList">جاري تحميل الأسماء...</div>
</div>

<script type="module">
    import { db } from './config.js';
    import { collection, getDocs } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    async function loadPlayers() {
        const snap = await getDocs(collection(db, "Players"));
        const list = document.getElementById('playersList');
        list.innerHTML = "";
        
        snap.forEach(doc => {
            const p = doc.data();
            const div = document.createElement('div');
            div.className = "player-select-item";
            div.innerHTML = `
                <img src="${p.photo}">
                <b>${p.name}</b>
            `;
            div.onclick = () => {
                // حفظ بيانات اللاعب في المتصفح (Session)
                localStorage.setItem('currentPlayerId', doc.id);
                localStorage.setItem('currentPlayerName', p.name);
                window.location.href = "teams.html";
            };
            list.appendChild(div);
        });
    }
    loadPlayers();
</script>
</body>
</html>
